<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>おうちクラベル｜今の家の価値をチェック</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: #fff;
      -webkit-text-size-adjust: 100%;
    }

    .manga-container {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      padding: 0 8px;
    }

    .manga-container img {
      display: block;
      width: 100%;
      height: auto;
      margin-bottom: 12px;
    }

    /* CTA button at the bottom */
    .cta-section {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 40px;
      background: #fff;
      text-align: center;
    }

    .cta-button {
      display: block;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      padding: 18px 24px;
      background: #2ecc40;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 12px rgba(46, 204, 64, 0.3);
      transition: background 0.2s;
    }

    .cta-button:active {
      background: #27ae35;
    }

    .cta-sub {
      margin-top: 12px;
      font-size: 13px;
      color: #888;
    }

    /* Desktop: center the LP */
    @media (min-width: 481px) {
      body {
        display: flex;
        justify-content: center;
        background: #fff;
      }

      .wrapper {
        width: 480px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="manga-container">
      <img src="images/panel_01.png?v=2" alt="Panel 1" loading="eager">
      <img src="images/panel_02.png?v=2" alt="Panel 2" loading="eager">
      <img src="images/panel_03.png?v=2" alt="Panel 3" loading="eager">
      <img src="images/panel_04.png?v=2" alt="Panel 4" loading="lazy">
      <img src="images/panel_05.png?v=2" alt="Panel 5" loading="lazy">
    </div>

    <div class="cta-section">
      <a href="#" class="cta-button">無料で今の家の価値をチェック</a>
      <p class="cta-sub">※査定額は参考値です。売却を強制するものではありません。</p>
    </div>
  </div>
</body>
</html>
